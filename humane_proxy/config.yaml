# HumaneProxy — package default configuration.
# Users can override any value by placing a `humane_proxy.yaml` in their
# project directory, or by setting HUMANE_PROXY_* environment variables.

server:
  host: "0.0.0.0"
  port: 8000
  reload: false

safety:
  # Risk score threshold (0.0 - 1.0). Scores at or above this trigger escalation.
  risk_threshold: 0.7

  # Score boost applied when a trajectory spike is detected.
  spike_boost: 0.25

  # Maximum number of messages to retain per session for trajectory analysis.
  session_history_limit: 20

heuristics:
  # Self-harm keywords — phrases that indicate self-harm ideation.
  self_harm_keywords:
    - "want to die"
    - "kill myself"
    - "end my life"
    - "suicide"
    - "suicidal"
    - "want to kill myself"
    - "can't go on"
    - "no reason to live"
    - "overdose on"
    - "slit my wrists"
    - "hang myself"
    - "cutting myself"
    - "hurt myself"
    - "self harm"
    - "self-harm"

  # Criminal intent keywords — phrases indicating harmful criminal plans.
  criminal_keywords:
    - "how to make a bomb"
    - "how to build a bomb"
    - "how to poison someone"
    - "how to make poison"
    - "how to kill someone"
    - "how to get away with murder"
    - "how to make meth"
    - "how to synthesize fentanyl"
    - "how to cook meth"
    - "child pornography"
    - "explosive device"
    - "how to make ricin"

  # Score assigned per self-harm keyword match.
  self_harm_keyword_score: 0.7

  # Score assigned per criminal keyword match.
  criminal_keyword_score: 0.6

  # Score assigned when an intent pattern is detected.
  intent_pattern_score: 0.7

  # Context-reducing phrases that lower false positives.
  # When these appear alongside a single trigger, the score is reduced.
  context_reducers:
    - "laughing"
    - "of laughter"
    - "of embarrassment"
    - "of boredom"
    - "in the game"
    - "in minecraft"
    - "for my character"
    - "in fiction"
    - "the villain"
    - "the character"
    - "in a novel"
    - "in a movie"
    - "in a book"
    - "in a story"
    - "my character"
    - "warning signs"
    - "prevent"
    - "prevention"
    - "how to help"
    - "help someone"
    - "help a friend"
    - "awareness"
    - "for a novel"
    - "for a movie"
    - "for a book"
    - "for a story"

trajectory:
  # Number of recent messages to evaluate for spike detection.
  window_size: 5

  # Delta threshold: if current_score - mean(last N) > spike_delta, flag it.
  spike_delta: 0.35

escalation:
  # Per-session rate limiting for escalation logging.
  rate_limit_max: 3
  rate_limit_window_hours: 1

  # Webhook URLs — leave empty to disable.
  webhooks:
    slack_url: ""
    discord_url: ""
    pagerduty_routing_key: ""

# ---------------------------------------------------------------------------
# 3-Stage Cascade Pipeline (Phase 2)
# ---------------------------------------------------------------------------

pipeline:
  # Which stages to enable. [1] = heuristics only, [1,2] = +embeddings,
  # [1,2,3] = full pipeline with reasoning LLM.
  enabled_stages: [1]

  # Early-exit ceilings: if the combined score is below this after the
  # given stage AND category is "safe", skip remaining stages.
  stage1_ceiling: 0.3
  stage2_ceiling: 0.4

stage2:
  # Sentence-transformer model name (local).
  # Requires: pip install humane-proxy[ml]
  model: "all-MiniLM-L6-v2"

  # Cosine similarity threshold: scores below this are "safe".
  safe_threshold: 0.35

  # Ambiguity dampening: when self-harm embedding score falls in this
  # band, benign anchors are also compared.  If benign semantics are
  # competitive (within ambiguity_margin), the score is halved.
  ambiguity_low: 0.30
  ambiguity_high: 0.55
  ambiguity_margin: 0.05

stage3:
  # Provider: "auto" | "openai_moderation" | "llamaguard" | "openai_chat" | "none"
  # "auto" checks OPENAI_API_KEY → openai_moderation, then GROQ_API_KEY → llamaguard.
  provider: "auto"

  # HTTP timeout for Stage-3 API calls (seconds).
  timeout: 10

  openai_moderation:
    api_url: "https://api.openai.com/v1/moderations"

  llamaguard:
    api_url: "https://api.groq.com/openai/v1/chat/completions"
    model: "meta-llama/llama-guard-3-8b"

  openai_chat:
    api_url: "https://api.openai.com/v1/chat/completions"
    model: "gpt-4o-mini"

privacy:
  # If false (default), only a SHA-256 hash of the message is stored
  # in the escalation DB — never the raw text.
  store_message_text: false

# ---------------------------------------------------------------------------
# Phase 3 — Care Response & Category-Specific Behaviour
# ---------------------------------------------------------------------------

safety:
  risk_threshold: 0.7
  spike_boost: 0.25
  session_history_limit: 20

  categories:
    self_harm:
      # Always notify the operator when self-harm is detected.
      always_escalate: true

      # Self-harm escalation threshold: embedding/pipeline scores at or above
      # this value trigger escalation.  Scores below are downgraded to safe.
      # Set lower for more aggressive catching, higher to reduce false positives.
      escalate_threshold: 0.5

      # "block"   (default / Mode B) — HumaneProxy itself replies with an
      #           empathetic message and international crisis resources.
      # "forward" (Mode A) — forward to the upstream LLM with a care-context
      #           system prompt injected before the user message.
      response_mode: "block"

      # Optional: override the default block message (leave empty to use built-in).
      block_message: ""

    criminal_intent:
      # Score threshold for escalation (below this → only log, no webhook).
      escalate_threshold: 0.65

      # Score threshold for blocking the request entirely.
      block_threshold: 0.80

# ---------------------------------------------------------------------------
# Storage Backend
# ---------------------------------------------------------------------------

storage:
  # "sqlite" (default, zero config) | "redis" | "postgres"
  backend: "sqlite"

  sqlite:
    # Path relative to CWD (or absolute).
    path: "escalations.db"

  redis:
    url: "redis://localhost:6379/0"
    key_prefix: "humane_proxy:"

  postgres:
    dsn: "postgresql://user:pass@localhost:5432/humane_proxy"
    pool_size: 5

# ---------------------------------------------------------------------------
# Admin API
# ---------------------------------------------------------------------------

admin:
  # Bearer token authentication for /admin/* routes.
  # Can also be set via: HUMANE_PROXY_ADMIN_KEY env var.
  # Leave empty to disable the admin API entirely.
  api_key: ""

# ---------------------------------------------------------------------------
# Extended Webhook Options (Phase 3)
# ---------------------------------------------------------------------------

escalation:
  rate_limit_max: 3
  rate_limit_window_hours: 1

  webhooks:
    slack_url: ""
    discord_url: ""
    pagerduty_routing_key: ""

    # Microsoft Teams incoming webhook URL (adaptive card format).
    teams_url: ""

    # Email alert via SMTP (uses stdlib — no extra dependencies).
    email:
      # SMTP server settings
      host: ""
      port: 587
      use_tls: true
      username: ""
      password: ""
      from: ""
      # List of recipient addresses
      to: []

